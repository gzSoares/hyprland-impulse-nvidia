name: Build e Push da Imagem Bootc

on:
  schedule:
    # Dispara as 03h45 diariamente (horário de Brasília)
    - cron: '45 6 * * *'
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Extrair Versão da Imagem Base
        id: base_version
        run: |
          VERSION=$(grep '^FROM' Containerfile | head -n 1 | awk -F: '{print $2}' | awk '{print $1}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Instalar Buildah
        run: |
          sudo apt-get update
          sudo apt-get install -y buildah

      - name: Login no GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          sudo buildah login \
            -u "${{ github.actor }}" \
            --password-stdin \
            ${{ env.REGISTRY }}

      - name: Gerar Timestamp (Horário de Brasília)
        id: timestamp
        run: |
          echo "date=$(TZ='America/Sao_Paulo' date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Extrair metadados
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.base_version.outputs.version }}-${{ steps.timestamp.outputs.date }}
            type=raw,value=${{ steps.base_version.outputs.version }}-latest
            type=ref,event=branch
            type=sha,format=short
            latest

      - name: Build da Imagem com Buildah
        run: |
          LOCAL_IMAGE=localhost/bootc-image

          sudo buildah build \
            --storage-driver=vfs \
            --format docker \
            --skip-unused-stages=false \
            --security-opt=label=disable \
            --pull \
            --no-cache \
            -t "$LOCAL_IMAGE" \
            -f Containerfile \
            -v "$(pwd):/run/src" \
            .

      - name: Push da Imagem
        run: |
          LOCAL_IMAGE=localhost/bootc-image

          while read -r tag; do
            [ -z "$tag" ] && continue

            echo "Tagging: $tag"

            sudo buildah tag "$LOCAL_IMAGE" "$tag"

            echo "Pushing: $tag"

            sudo buildah push \
              --storage-driver=vfs \
              "$tag"

          done <<< "${{ steps.meta.outputs.tags }}"

      - name: Notificar Sucesso no Telegram
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ Rebuild Completo Bootc concluído!
            Base: ${{ steps.base_version.outputs.version }}
            Tag Gerada: ${{ steps.base_version.outputs.version }}-${{ steps.timestamp.outputs.date }}
            Repositório: ${{ github.repository }}

      - name: Notificar Falha no Telegram
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ Erro no Rebuild Agendado!
            Base tentada: ${{ steps.base_version.outputs.version }}
            Link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
