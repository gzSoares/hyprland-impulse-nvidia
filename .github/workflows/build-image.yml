```yaml
name: Build e Push da Imagem Bootc

on:
  schedule:
    # Dispara às 03h45 diariamente (horário de Brasília)
    - cron: '45 6 * * *'

  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Extrair Versão da Imagem Base
        id: base_version
        run: |
          VERSION=$(grep '^FROM' Containerfile | head -n 1 | awk -F: '{print $2}' | awk '{print $1}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Configurar QEMU
        uses: docker/setup-qemu-action@v3

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Gerar Timestamp (Horário de Brasília)
        id: timestamp
        run: |
          echo "date=$(TZ='America/Sao_Paulo' date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Extrair metadados
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.base_version.outputs.version }}-${{ steps.timestamp.outputs.date }}
            type=raw,value=${{ steps.base_version.outputs.version }}-latest
            type=ref,event=branch
            type=sha,format=short
            latest

      - name: Build e Push da Imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile

          # Builda a stage do Chunkah
          target: chunkah

          push: true
          pull: true
          no-cache: true

          # Necessário para Chunkah
          build-args: |
            CHUNKAH_CONFIG_STR=dummy

          # Evita problemas com attestation/provenance
          provenance: false

          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Notificar Sucesso no Telegram
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ Rebuild Completo Bootc concluído!

            Base:
            ${{ steps.base_version.outputs.version }}

            Tag:
            ${{ steps.base_version.outputs.version }}-${{ steps.timestamp.outputs.date }}

            Repositório:
            ${{ github.repository }}

      - name: Notificar Falha no Telegram
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ Erro no Rebuild Agendado!

            Base tentada:
            ${{ steps.base_version.outputs.version }}

            Logs:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
```
